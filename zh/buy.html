<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购买 EdgeTalk License</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #1d1d1f; line-height: 1.6; }
  .lang { text-align: right; padding: 12px 20px; font-size: 13px; }
  .lang a { color: #666; text-decoration: none; }
  .container { max-width: 600px; margin: 0 auto; padding: 40px 24px 60px; }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .subtitle { font-size: 15px; color: #666; margin-bottom: 32px; }
  .plan { background: #fff; border: 2px solid #e5e5e5; border-radius: 12px; padding: 28px; margin-bottom: 20px; }
  .plan.selected { border-color: #0f3460; }
  .plan h2 { font-size: 20px; margin-bottom: 4px; }
  .plan .price { font-size: 36px; font-weight: 700; color: #0f3460; margin: 12px 0 4px; }
  .plan .price small { font-size: 16px; font-weight: 400; color: #999; }
  .plan .features { font-size: 14px; color: #555; margin: 12px 0; padding-left: 20px; }
  .plan .features li { margin-bottom: 4px; }
  .email-field { margin: 20px 0; }
  .email-field label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
  .email-field input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; }
  .buy-btn { display: block; width: 100%; padding: 14px; font-size: 17px; font-weight: 600; color: #fff; background: #0f3460; border: none; border-radius: 10px; cursor: pointer; margin-top: 16px; }
  .buy-btn:hover { background: #1a4a80; }
  .buy-btn:disabled { background: #999; cursor: not-allowed; }
  .error { color: #d00; font-size: 13px; margin-top: 8px; }
  #qrcode img { width: 240px; height: 240px; margin: 16px auto; display: block; }
  #result { text-align: center; margin-top: 20px; display: none; }
  #result .key { font-size: 28px; font-family: monospace; font-weight: 700; background: #f0f4ff; padding: 12px 20px; border-radius: 8px; letter-spacing: 2px; display: inline-block; margin: 12px 0; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e5e5e5; border-top-color: #0f3460; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { text-align: center; padding: 40px 24px 60px; font-size: 13px; color: #999; }
  footer a { color: #666; text-decoration: none; margin: 0 8px; }
</style>
</head>
<body>

<div class="lang"><a href="/edgetalk/en/buy">English</a></div>

<div class="container">
  <h1>EdgeTalk License</h1>
  <p class="subtitle">一次买断，终身使用。可在最多 3 台 Mac 上激活。14 天免费试用。</p>

  <div class="plan selected">
    <h2>个人版</h2>
    <div class="price">&yen;39 <small>一次买断</small></div>
    <ul class="features">
      <li>全部功能解锁</li>
      <li>最多 3 台 Mac 使用</li>
      <li>支持 1.7B 增强模型</li>
      <li>免费更新</li>
      <li>包含 14 天免费试用</li>
    </ul>
  </div>

  <div class="email-field">
    <label for="email">邮箱地址（接收 License Key）</label>
    <input type="email" id="email" placeholder="you@example.com" required>
  </div>

  <div id="paybtn-area">
    <button class="buy-btn" id="paybtn" onclick="startPayment()">
      购买 — &yen;39
    </button>
  </div>

  <div id="qrcode"></div>

  <div id="result">
    <p style="color:#333;font-size:15px;">你的 License Key：</p>
    <div class="key" id="license-key"></div>
    <p style="color:#666;font-size:13px;margin-top:8px;">已复制到剪贴板。在 App 中输入即可激活。</p>
    <p><a href="/edgetalk/download/" style="color:#0f3460;">下载 EdgeTalk →</a></p>
  </div>

  <div id="error" class="error"></div>
</div>

<footer>
  <a href="/edgetalk/zh/">首页</a>
  <a href="/edgetalk/zh/support">技术支持</a>
  <p style="margin-top:8px;">&copy; 2026 EdgeTalk</p>
</footer>

<script>
const API = "https://edgetalk.app/api";

async function startPayment() {
  const email = document.getElementById("email").value.trim();
  if (!email) {
    document.getElementById("error").textContent = "请输入邮箱地址";
    return;
  }

  const btn = document.getElementById("paybtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 处理中…';
  document.getElementById("error").textContent = "";

  try {
    const resp = await fetch(API + "/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email }),
    });
    const data = await resp.json();

    if (data.provider === "payjs") {
      btn.style.display = "none";
      document.getElementById("qrcode").innerHTML = `<img src="${data.qrcode}" alt="支付二维码">`;
      pollPayment(data.orderId);
    } else if (data.provider === "lemonsqueezy") {
      window.location.href = data.url;
    } else {
      throw new Error("Unknown payment provider");
    }
  } catch (err) {
    document.getElementById("error").textContent = "支付请求失败，请重试。";
    btn.disabled = false;
    btn.textContent = "购买 — ¥39";
  }
}

async function pollPayment(orderId) {
  for (let i = 0; i < 60; i++) {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const resp = await fetch(`${API}/order-status?order=${orderId}`);
      const data = await resp.json();
      if (data.status === "paid" && data.license_key) {
        document.getElementById("result").style.display = "block";
        document.getElementById("license-key").textContent = data.license_key;
        navigator.clipboard.writeText(data.license_key);
        return;
      }
    } catch (e) {}
  }
  document.getElementById("error").textContent = "支付确认超时，请检查邮箱是否收到 License Key。";
}
</script>

</body>
</html>
