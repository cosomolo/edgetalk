<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdgeTalk — 离线语音输入</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #1d1d1f; line-height: 1.6; }
  .hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 80px 24px; text-align: center; }
  .hero h1 { font-size: 48px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
  .hero p { font-size: 20px; opacity: .85; max-width: 480px; margin: 0 auto; }
  .section { max-width: 720px; margin: 0 auto; padding: 60px 24px; }
  .section h2 { font-size: 28px; margin-bottom: 16px; }
  .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
  .feature { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .feature h3 { font-size: 16px; margin-bottom: 6px; }
  .feature p { font-size: 14px; color: #666; }
  footer { text-align: center; padding: 40px 24px; font-size: 13px; color: #999; }
  footer a { color: #666; text-decoration: none; margin: 0 8px; }
  footer a:hover { color: #333; }
</style>
</head>
<body>

<section class="hero">
  <h1>EdgeTalk</h1>
  <p>按住右 ⌘ 说话，松开即输入。完全离线，语音数据不离开本机。</p>
</section>

<section class="section">
  <h2>为什么选择 EdgeTalk</h2>
  <div class="features">
    <div class="feature">
      <h3>🔒 完全离线</h3>
      <p>所有识别在本机完成。不需要网络、不需要云服务、不需要账号。语音数据从未离开你的设备。</p>
    </div>
    <div class="feature">
      <h3>⚡ 实时显示</h3>
      <p>说话时文字实时出现在浮动窗口中。双模型校正：流式识别 + LLM 后台校正。</p>
    </div>
    <div class="feature">
      <h3>🌐 中英双语</h3>
      <p>支持中文和英文混合识别。可选标准与增强校正模型，平衡速度与准确率。</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>系统要求</h2>
  <p>macOS 14.0 或更高版本，推荐 Apple Silicon。</p>
  <p style="margin-top:16px; font-size:14px; color:#888;">现已在 App Store 上架。</p>
</section>

<footer>
  <a href="/edgeTalk/privacy">隐私政策</a>
  <a href="/edgeTalk/support">技术支持</a>
  <p style="margin-top:8px;">&copy; 2026 EdgeTalk</p>
</footer>

</body>
</html>
